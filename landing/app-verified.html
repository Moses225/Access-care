<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified — Morava</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      width: 56px; height: 56px;
      background: #0d9488;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .logo svg { width: 28px; height: 28px; }
    .check-wrap {
      width: 72px; height: 72px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .check-wrap svg { width: 36px; height: 36px; color: #16a34a; }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-primary {
      display: block;
      background: #0d9488;
      color: white;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #0f766e; }
    .store-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .store-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .store-btn:hover { background: #1e293b; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #94a3b8;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <path d="M3 17 Q7 7 12 12 Q17 17 21 7"/>
        <circle cx="21" cy="7" r="2" fill="white" stroke="none"/>
      </svg>
    </div>

    <!-- Check -->
    <div class="check-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <h1>Email verified!</h1>
    <p>Your Morava account is confirmed. Tap the button below to open the app and sign in.</p>

    <!-- Deep link back to the app -->
    <a href="morava://" class="btn-primary" id="openAppBtn">Open Morava app →</a>

    <div class="divider">Don't have the app?</div>

    <div class="store-row">
      <a href="https://apps.apple.com/us/app/morava/id6743751540" class="store-btn" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.moravacare.app" class="store-btn" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M3 20.5v-17c0-.83.94-1.3 1.6-.8l15 8.5c.6.34.6 1.26 0 1.6l-15 8.5c-.66.5-1.6.03-1.6-.8z"/></svg>
        Google Play
      </a>
    </div>
  </div>

  <script>
    // Try to open the app automatically on mobile
    // Falls back gracefully — user still sees the button
    const ua = navigator.userAgent.toLowerCase();
    const isMobile = /iphone|ipad|android/.test(ua);
    if (isMobile) {
      // Small delay so the page renders first
      setTimeout(() => {
        window.location.href = "morava://";
      }, 800);
    }
  </script>
</body>
</html>
